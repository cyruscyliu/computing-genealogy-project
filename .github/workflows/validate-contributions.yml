name: Validate profile contributions

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate raw data and site
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and build the dataset
        run: npm run build:data

      - name: Run tests
        run: npm test
